# Global Controller Configuration
# Lists all agents and workflows that Ventis manages.

agents:
  - name: ExampleAgent
    replicas: 1
    redis_port: 6379
    instance_type: t2.nano
    resources:
      cpu: 1
      memory: 512
    entrypoint: agents/example_agent.py
    provider: local

  - name: VllmAgent
    replicas: 1
    redis_port: 6379
    resources:
      cpu: 2
      memory: 2048
      gpu: 1
    entrypoint: agents/vllm_agent.py
    provider: local

  - name: Workflow
    replicas: 1
    type: workflow
    redis_port: 6379
    workflow_file: workflows/example_workflow.py
    provider: local

poll_interval: 5

redis:
  host: localhost
  port: 6379
  db: 0

# EC2 defaults for `provider: EC2` replicas.
# Keep them here so `config/global_controller.yaml` stays the only source of truth.
#
ec2:
  # For the current EC2 runtime path, the instance security group must allow
  # inbound TCP 50051 and 6379 from the global controller host's source IP.
  region: us-east-1
  ami_id: ami-0123456789abcdef0
  subnet_id: subnet-0123456789abcdef0
  security_group_ids:
    - sg-0123456789abcdef0
  transport: ssm
  endpoint_url:
  key_name: ventis-key
  ssm_document_name: AWS-RunShellScript
  ssm_timeout: 180
  agent_image: ventis-agent-base
  remote_project_dir: /opt/ventis/project
