# Global Controller Configuration
# Lists all agents and workflows that Ventis manages.

agents:
  - name: ExampleAgent
    host: localhost
    port: 8051
    redis_port: 6379
    replicas: 1
    resources:
      cpu: 1
      memory: 512
    entrypoint: agents/example_agent.py
    # Optional: policies run automatically after the agent returns a result.
    # Each entry is a `module:function` reference. Policies are side-effect
    # only (audit / notify / enforce) — they react to the output but do not
    # modify it, so their order does not matter.
    # output_policies:
    #   - policies.example:audit_log

  - name: VllmAgent
    host: localhost
    port: 8052
    redis_port: 6379
    replicas: 1
    resources:
      cpu: 2
      memory: 2048
      gpu: 1
    entrypoint: agents/vllm_agent.py

  - name: Workflow
    host: localhost
    port: 8050
    type: workflow
    api_port: 8080
    redis_port: 6379
    replicas: 1
    workflow_file: workflows/example_workflow.py

# Polling interval in seconds
poll_interval: 5

# Redis connection
redis:
  host: localhost
  port: 6379
  db: 0
